    <h2>お問い合わせ</h2>
    <form action="/submit" method="post">

    <div>
    <label for="contact-name">お名前</label>
    <input type="text" id="contact-name" name="name" required>
    </div>
    <div>
        <label for="contact-category">お問い合わせ種別</label>
        <select name="category" id="contact-category">
            <option value="">--選択してください--</option>
            <option value="general1">一般的な問い合わせ</option>
            <option value="feedback">ご意見・ご要望</option>
        </select>
    </div>

    <div>
        <label for="contact-message">ご要望内容</label>
        <textarea name="message" id="contact-message" rows="5" required></textarea>
    </div>
    <div>
        <button type="submit">送信する</button>
    </div>
    </form>
</body>
